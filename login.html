<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container{
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            text-align: center;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background-color: blue;
            color: white;
            border: none;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Admin Login</h2>

    <form>

        <input type="email" placeholder="Enter Email">

        <input type="password" placeholder="Enter Password">

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
